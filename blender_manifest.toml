schema_version = "1.0.0"

id = "easy_rigify"
version = "1.2.0"
name = "Easy Rigify"
tagline = "Place markers, auto-align a Rigify metarig, smart skinning"
maintainer = "Dwayne Jones"
type = "add-on"

# Optional link to documentation, support, source files, etc
# website = "https://blendermarket.com/products/easy-rigify"

tags = ["Rigging", "Animation"]

blender_version_min = "4.2.0"
# blender_version_max = "5.1.2"

license = [
  "SPDX:GPL-3.0-or-later",
]
copyright = [
  "2024-2026 Dwayne Jones",
]

# Bundled 3rd-party wheels (onnxruntime + Pillow, ARP-style): Blender installs
# the matching one automatically when the addon is enabled — offline, no pip,
# no "Install ONNX Runtime" button. Only the two LEAF packages are bundled;
# their PyPI-declared transitive deps (sympy, protobuf, coloredlogs, mpmath,
# flatbuffers, humanfriendly, packaging) are verified NOT imported at runtime
# by either `import onnxruntime` or a real InferenceSession().run() call - pip
# installs them anyway (metadata says "required"), but nothing in this addon's
# code path touches them. numpy is deliberately NOT bundled: Blender's own
# numpy is already on sys.path, and the wheel site-packages dir is inserted
# BEFORE it, so bundling our own numpy would shadow Blender's (the crash this
# addon's dependency code has guarded against since 2026-06-30 — see
# [[project_onnx_deps_install]]). cp311 covers Blender 4.2-4.5; cp313 covers
# Blender 5.x. Re-run dev/native/download_wheels.py and update this list when
# either package version changes.
wheels = [
  "./wheels/onnxruntime-1.20.1-cp311-cp311-win_amd64.whl",
  "./wheels/onnxruntime-1.20.1-cp311-cp311-manylinux_2_27_x86_64.manylinux_2_28_x86_64.whl",
  "./wheels/onnxruntime-1.20.1-cp311-cp311-macosx_13_0_universal2.whl",
  "./wheels/onnxruntime-1.20.1-cp313-cp313-win_amd64.whl",
  "./wheels/onnxruntime-1.20.1-cp313-cp313-manylinux_2_27_x86_64.manylinux_2_28_x86_64.whl",
  "./wheels/onnxruntime-1.20.1-cp313-cp313-macosx_13_0_universal2.whl",
  "./wheels/pillow-12.3.0-cp311-cp311-win_amd64.whl",
  "./wheels/pillow-12.3.0-cp311-cp311-manylinux_2_27_x86_64.manylinux_2_28_x86_64.whl",
  "./wheels/pillow-12.3.0-cp311-cp311-macosx_11_0_arm64.whl",
  "./wheels/pillow-12.3.0-cp311-cp311-macosx_10_10_x86_64.whl",
  "./wheels/pillow-12.3.0-cp313-cp313-win_amd64.whl",
  "./wheels/pillow-12.3.0-cp313-cp313-manylinux_2_27_x86_64.manylinux_2_28_x86_64.whl",
  "./wheels/pillow-12.3.0-cp313-cp313-macosx_11_0_arm64.whl",
  "./wheels/pillow-12.3.0-cp313-cp313-macosx_10_13_x86_64.whl",
]

[build]
paths_exclude_pattern = [
  "__pycache__/",
  "/.git/",
  "/.github/",
  "/.gitignore",
  "/*.zip",
  # All training / validation / tooling, plaintext model sources, datasets,
  # backups and scratch live under dev/ — none of it ships. This INCLUDES the
  # model-crypto C source (dev/native/ercrypto.c) and the masked-key table;
  # only the COMPILED binaries in native/ ship.
  "/dev/",
  "/.claude/",
  # Stale full-addon copy + old build zips — must never ship (it also still
  # contains the OLD model-crypto key/algorithm).
  "/Backup/",
  # Root-level dataset/debug dirs (17k+ face-capture images, ~2GB) — training
  # data, not shipped. Caught late: the first extension build was 2GB because
  # this lives at repo root, not under dev/, so the /dev/ exclude missed it.
  "/face_dataset/",
  "/debug_face_infer/",
  # Safety net: no plaintext models should ever ship (only models/*.rmodel)
  "/*.onnx",
  # Stale timestamped model backups (old key) — never ship.
  "*.rmodel.bak*",
]
